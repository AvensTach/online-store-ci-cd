{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}CI-CD Store{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="{% static 'shop/styles.css' %}">
  <script defer src="{% static 'shop/scripts.js' %}"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="{% url 'shop:home' %}">CI-CD Store</a>
      <nav class="main-nav">
        <a href="{% url 'shop:catalog' %}">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">© CI-CD Store</div>
  </footer>
</body>
</html>
