{% extends "base.html" %}
{% block title %}{{ product.name }} - CI-CD Store{% endblock %}
{% block content %}
<article class="product-detail">
  <h1>{{ product.name }}</h1>
  <p class="price">${{ product.price }}</p>
  <p class="desc">{{ product.description|linebreaksbr }}</p>

  <p class="category">Category: 
    <a href="{% url 'shop:catalog_by_category' product.category.slug %}">
      {{ product.category.name }}
    </a>
  </p>

  <p><a class="btn" href="{% url 'shop:catalog' %}">Back to catalog</a></p>
</article>
{% endblock %}
